<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Full bleed background (safe zone = inner 80%) -->
  <rect width="512" height="512" fill="#00263E"/>
  <!-- Factory (scaled/centered to fit safe zone) -->
  <rect x="96" y="263" width="320" height="159" rx="6" fill="#0369EA"/>
  <!-- Chimneys -->
  <rect x="130" y="186" width="40" height="80" rx="4" fill="#0369EA"/>
  <rect x="196" y="163" width="40" height="103" rx="4" fill="#0369EA"/>
  <rect x="262" y="196" width="40" height="70" rx="4" fill="#0369EA"/>
  <!-- Chimney caps -->
  <rect x="123" y="174" width="54" height="18" rx="4" fill="#1DCAD3"/>
  <rect x="189" y="151" width="54" height="18" rx="4" fill="#1DCAD3"/>
  <rect x="255" y="184" width="54" height="18" rx="4" fill="#1DCAD3"/>
  <!-- Windows -->
  <rect x="112" y="292" width="50" height="40" rx="4" fill="white" opacity="0.9"/>
  <rect x="181" y="292" width="50" height="40" rx="4" fill="white" opacity="0.9"/>
  <rect x="250" y="292" width="50" height="40" rx="4" fill="white" opacity="0.9"/>
  <rect x="319" y="292" width="50" height="40" rx="4" fill="white" opacity="0.9"/>
  <!-- Door -->
  <rect x="220" y="353" width="72" height="69" rx="4" fill="#00263E"/>
  <circle cx="283" cy="390" r="5.5" fill="#1DCAD3"/>
  <!-- Bottom accent -->
  <rect x="96" y="415" width="320" height="11" rx="5" fill="#1DCAD3"/>
  <!-- "FT" brand mark top right -->
  <circle cx="390" cy="110" r="54" fill="#0369EA"/>
  <text x="390" y="128" font-family="Arial Black,sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">FT</text>
</svg>
