<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#00263E"/>

  <!-- Factory building silhouette -->
  <!-- Main building body -->
  <rect x="30" y="95" width="140" height="70" rx="3" fill="#0369EA"/>

  <!-- Factory chimneys -->
  <rect x="45" y="65" width="18" height="35" rx="2" fill="#0369EA"/>
  <rect x="75" y="55" width="18" height="45" rx="2" fill="#0369EA"/>
  <rect x="105" y="70" width="18" height="30" rx="2" fill="#0369EA"/>

  <!-- Chimney tops -->
  <rect x="42" y="60" width="24" height="8" rx="2" fill="#1DCAD3"/>
  <rect x="72" y="50" width="24" height="8" rx="2" fill="#1DCAD3"/>
  <rect x="102" y="65" width="24" height="8" rx="2" fill="#1DCAD3"/>

  <!-- Smoke dots -->
  <circle cx="54" cy="50" r="4" fill="white" opacity="0.3"/>
  <circle cx="50" cy="41" r="3" fill="white" opacity="0.2"/>
  <circle cx="84" cy="38" r="5" fill="white" opacity="0.3"/>
  <circle cx="80" cy="28" r="3.5" fill="white" opacity="0.2"/>
  <circle cx="114" cy="54" r="4" fill="white" opacity="0.3"/>

  <!-- Windows on main building -->
  <rect x="40" y="108" width="20" height="16" rx="2" fill="white" opacity="0.9"/>
  <rect x="70" y="108" width="20" height="16" rx="2" fill="white" opacity="0.9"/>
  <rect x="100" y="108" width="20" height="16" rx="2" fill="white" opacity="0.9"/>
  <rect x="130" y="108" width="20" height="16" rx="2" fill="white" opacity="0.9"/>

  <!-- Door -->
  <rect x="83" y="133" width="34" height="32" rx="2" fill="#00263E"/>
  <circle cx="113" cy="150" r="2.5" fill="#1DCAD3"/>

  <!-- Bottom stripe accent -->
  <rect x="30" y="160" width="140" height="5" rx="2" fill="#1DCAD3"/>

  <!-- Gear icon top-right accent -->
  <circle cx="155" cy="55" r="14" fill="#0369EA" stroke="#1DCAD3" stroke-width="2"/>
  <circle cx="155" cy="55" r="7" fill="#00263E"/>
  <!-- Gear teeth -->
  <rect x="152.5" y="38" width="5" height="6" rx="1.5" fill="#1DCAD3"/>
  <rect x="152.5" y="66" width="5" height="6" rx="1.5" fill="#1DCAD3"/>
  <rect x="138" y="52.5" width="6" height="5" rx="1.5" fill="#1DCAD3"/>
  <rect x="166" y="52.5" width="6" height="5" rx="1.5" fill="#1DCAD3"/>
</svg>
